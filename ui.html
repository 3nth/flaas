<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>flaas</title>
<link rel="icon" id="favicon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23555' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><path d='M9 18h6M10 22h4M12 2a7 7 0 0 1 4 12.7V17a1 1 0 0 1-1 1h-6a1 1 0 0 1-1-1v-2.3A7 7 0 0 1 12 2z'/></svg>">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #3a3020;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    user-select: none;
    -webkit-user-select: none;
  }
  .room-overlay {
    position: fixed;
    inset: 0;
    background: #1a1a2e;
    pointer-events: none;
    transition: opacity 0.4s ease-out;
    z-index: 0;
  }
  .tile {
    position: relative;
    z-index: 1;
    width: 140px;
    height: 320px;
    border-radius: 14px;
    background: #2a2a3e;
    overflow: hidden;
    cursor: pointer;
    touch-action: none;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  .fill {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 0%;
    background: linear-gradient(to top, #e2a714, #f0d060);
    transition: height 0.15s ease-out, opacity 0.3s;
    opacity: 0;
  }
  .tile.on .fill { opacity: 1; }
  .pct {
    position: relative;
    z-index: 1;
    font-size: 1.8rem;
    font-weight: 600;
    color: #a0a0b0;
    margin-top: 0.75rem;
    transition: color 0.4s;
  }
  .device-name {
    position: relative;
    z-index: 1;
    font-size: 1.5rem;
    font-weight: 500;
    color: #a0a0b0;
    margin-bottom: 1rem;
    transition: color 0.4s;
  }
  .error {
    position: relative;
    z-index: 1;
    color: #ff6b6b;
    text-align: center;
    font-size: 0.8rem;
    min-height: 1.2em;
    margin-top: 1rem;
    max-width: 200px;
  }
  .mqtt-status {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.85rem;
    color: #555;
    margin-top: 0.75rem;
    transition: color 0.4s;
  }
  footer {
    position: fixed;
    z-index: 1;
    bottom: 12px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 0.7rem;
  }
  footer a {
    color: #555;
    text-decoration: none;
    font-size: 0.85rem;
    transition: color 0.4s;
  }
  footer a:hover { color: #888; }
  .mqtt-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #555;
  }
  .mqtt-dot.connected { background: #4caf50; }
  .mqtt-dot.disconnected { background: #ff6b6b; }
</style>
</head>
<body>
<div class="room-overlay" id="room-overlay"></div>
<span class="device-name" id="device-name"></span>
<div class="tile" id="tile">
  <div class="fill" id="fill"></div>
</div>
<span class="pct" id="pct">--%</span>
<p class="error" id="error"></p>
<div class="mqtt-status" id="mqtt-status" style="display:none">
  <span class="mqtt-dot" id="mqtt-dot"></span>
  <span id="mqtt-label">MQTT</span>
</div>
<footer><a href="https://github.com/3nth/flaas">flaas</a></footer>
<script>
  const tile = document.getElementById('tile');
  const fill = document.getElementById('fill');
  const pct = document.getElementById('pct');
  const error = document.getElementById('error');
  const roomOverlay = document.getElementById('room-overlay');
  const apiKey = new URLSearchParams(location.search).get('key') || '';

  let isOn = false;
  let brightness = 75;
  let updating = false;
  let dragging = false;
  let dragMoved = false;
  let debounce;

  async function api(path, body, method) {
    error.textContent = '';
    try {
      const m = method || (body !== undefined ? 'POST' : 'GET');
      const opts = { method: m, headers: {} };
      if (body !== undefined) {
        opts.headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(body);
      }
      if (apiKey && m === 'POST') opts.headers['X-Api-Key'] = apiKey;
      const res = await fetch(path, opts);
      if (res.status === 401) throw new Error('Invalid API key');
      if (!res.ok) throw new Error(res.statusText);
      return res.status === 200 ? await res.json() : null;
    } catch (e) {
      error.textContent = e.message;
      return null;
    }
  }

  const deviceNameEl = document.getElementById('device-name');
  const mqttLabelEl = document.getElementById('mqtt-label');
  const footerLink = document.querySelector('footer a');
  const favicon = document.getElementById('favicon');

  function render() {
    tile.classList.toggle('on', isOn);
    fill.style.height = (isOn ? brightness : 0) + '%';
    pct.textContent = Math.round(brightness) + '%';
    const t = isOn ? brightness / 100 : 0;
    roomOverlay.style.opacity = 1 - t * 0.85;
    // shift text from cool gray toward warm tan as room brightens
    const r = Math.round(160 + t * 60);
    const g = Math.round(160 + t * 40);
    const b = Math.round(176 - t * 60);
    const textColor = `rgb(${r},${g},${b})`;
    deviceNameEl.style.color = textColor;
    pct.style.color = textColor;
    // subtler for secondary text
    const sr = Math.round(85 + t * 50);
    const sg = Math.round(85 + t * 35);
    const sb = Math.round(85 - t * 20);
    const subColor = `rgb(${sr},${sg},${sb})`;
    mqttLabelEl.style.color = subColor;
    footerLink.style.color = subColor;
    // favicon: interpolate from gray to warm yellow
    const fr = Math.round(85 + t * 141);
    const fg = Math.round(85 + t * 98);
    const fb = Math.round(85 - t * 65);
    const fc = `%23${fr.toString(16).padStart(2,'0')}${fg.toString(16).padStart(2,'0')}${fb.toString(16).padStart(2,'0')}`;
    favicon.href = `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='${fc}' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><path d='M9 18h6M10 22h4M12 2a7 7 0 0 1 4 12.7V17a1 1 0 0 1-1 1h-6a1 1 0 0 1-1-1v-2.3A7 7 0 0 1 12 2z'/></svg>`;
  }

  async function refresh() {
    if (dragging) return;
    const state = await api('/');
    if (!state) return;
    updating = true;
    isOn = state.isOn;
    brightness = state.brightness;
    render();
    updating = false;
  }

  function getY(e) {
    return (e.touches ? e.touches[0] : e).clientY;
  }

  function brightnessFromY(y) {
    const rect = tile.getBoundingClientRect();
    const pctFromBottom = 1 - (y - rect.top) / rect.height;
    return Math.round(Math.max(1, Math.min(100, pctFromBottom * 100)));
  }

  tile.addEventListener('pointerdown', e => {
    dragging = true;
    dragMoved = false;
    tile.setPointerCapture(e.pointerId);
  });

  tile.addEventListener('pointermove', e => {
    if (!dragging) return;
    dragMoved = true;
    brightness = brightnessFromY(e.clientY);
    if (!isOn) isOn = true;
    render();
    clearTimeout(debounce);
    debounce = setTimeout(() => {
      api('/brightness', { brightness });
    }, 100);
  });

  tile.addEventListener('pointerup', async e => {
    if (!dragging) return;
    dragging = false;
    if (!dragMoved) {
      // tap: toggle on/off
      await api(isOn ? '/off' : '/on', undefined, 'POST');
      await refresh();
    }
  });

  // MQTT status
  const mqttStatus = document.getElementById('mqtt-status');
  const mqttDot = document.getElementById('mqtt-dot');
  const mqttLabel = document.getElementById('mqtt-label');

  async function refreshHealth() {
    try {
      const res = await fetch('/health');
      if (!res.ok) return;
      const h = await res.json();
      if (h.deviceName) deviceNameEl.textContent = h.deviceName;
      if (!h.mqttEnabled) { mqttStatus.style.display = 'none'; return; }
      mqttStatus.style.display = 'flex';
      mqttDot.className = 'mqtt-dot ' + (h.mqttConnected ? 'connected' : 'disconnected');
      mqttLabel.textContent = 'MQTT ' + (h.mqttConnected ? 'connected' : 'disconnected');
    } catch {}
  }

  refresh();
  refreshHealth();
  setInterval(refresh, 5000);
  setInterval(refreshHealth, 5000);
</script>
</body>
</html>
