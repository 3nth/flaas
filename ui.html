<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>flaas</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .card {
    background: #16213e;
    border-radius: 16px;
    padding: 2rem;
    width: 300px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  h1 { font-size: 1.2rem; text-align: center; margin-bottom: 1.5rem; color: #a0a0b0; }
  .toggle-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
  }
  .status { font-size: 1.1rem; }
  .switch {
    position: relative;
    width: 56px;
    height: 30px;
  }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute;
    inset: 0;
    background: #333;
    border-radius: 30px;
    cursor: pointer;
    transition: background 0.3s;
  }
  .slider::before {
    content: "";
    position: absolute;
    width: 24px;
    height: 24px;
    left: 3px;
    bottom: 3px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.3s;
  }
  .switch input:checked + .slider { background: #e2b714; }
  .switch input:checked + .slider::before { transform: translateX(26px); }
  .brightness-section { margin-bottom: 0.5rem; }
  .brightness-label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 0.5rem;
    font-size: 0.9rem;
    color: #a0a0b0;
  }
  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 8px;
    border-radius: 4px;
    background: #333;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #e2b714;
    cursor: pointer;
  }
  input[type="range"]::-moz-range-thumb {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #e2b714;
    cursor: pointer;
    border: none;
  }
  .error { color: #ff6b6b; text-align: center; font-size: 0.85rem; min-height: 1.2em; }
  .mqtt-status {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.8rem;
    color: #a0a0b0;
    justify-content: center;
    margin-top: 1rem;
  }
  .mqtt-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #555;
  }
  .mqtt-dot.connected { background: #4caf50; }
  .mqtt-dot.disconnected { background: #ff6b6b; }
  .mqtt-dot.disabled { background: #555; }
</style>
</head>
<body>
<div class="card">
  <h1>flaas</h1>
  <div class="toggle-row">
    <span class="status" id="status">--</span>
    <label class="switch">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>
  <div class="brightness-section">
    <div class="brightness-label">
      <span>Brightness</span>
      <span id="brightness-val">--</span>
    </div>
    <input type="range" id="brightness" min="1" max="100" value="75">
  </div>
  <p class="error" id="error"></p>
  <div class="mqtt-status" id="mqtt-status" style="display:none">
    <span class="mqtt-dot" id="mqtt-dot"></span>
    <span id="mqtt-label">MQTT</span>
  </div>
</div>
<script>
  const toggle = document.getElementById('toggle');
  const brightness = document.getElementById('brightness');
  const status = document.getElementById('status');
  const brightnessVal = document.getElementById('brightness-val');
  const error = document.getElementById('error');

  let updating = false;

  async function api(path, body, method) {
    error.textContent = '';
    try {
      const opts = { method: method || (body !== undefined ? 'POST' : 'GET') };
      if (body !== undefined) {
        opts.headers = { 'Content-Type': 'application/json' };
        opts.body = JSON.stringify(body);
      }
      const res = await fetch(path, opts);
      if (!res.ok) throw new Error(res.statusText);
      return res.status === 200 ? await res.json() : null;
    } catch (e) {
      error.textContent = e.message;
      return null;
    }
  }

  async function refresh() {
    const state = await api('/');
    if (!state) return;
    updating = true;
    toggle.checked = state.isOn;
    brightness.value = state.brightness;
    status.textContent = state.isOn ? 'On' : 'Off';
    brightnessVal.textContent = Math.round(state.brightness) + '%';
    updating = false;
  }

  toggle.addEventListener('change', async () => {
    if (updating) return;
    await api(toggle.checked ? '/on' : '/off', undefined, 'POST');
    await refresh();
  });

  let debounce;
  brightness.addEventListener('input', () => {
    brightnessVal.textContent = brightness.value + '%';
    clearTimeout(debounce);
    debounce = setTimeout(async () => {
      if (updating) return;
      await api('/brightness', { brightness: Number(brightness.value) });
      await refresh();
    }, 150);
  });

  const mqttStatus = document.getElementById('mqtt-status');
  const mqttDot = document.getElementById('mqtt-dot');
  const mqttLabel = document.getElementById('mqtt-label');

  async function refreshHealth() {
    try {
      const res = await fetch('/health');
      if (!res.ok) return;
      const h = await res.json();
      if (!h.mqttEnabled) {
        mqttStatus.style.display = 'none';
        return;
      }
      mqttStatus.style.display = 'flex';
      mqttDot.className = 'mqtt-dot ' + (h.mqttConnected ? 'connected' : 'disconnected');
      mqttLabel.textContent = 'MQTT ' + (h.mqttConnected ? 'connected' : 'disconnected');
    } catch {}
  }

  refresh();
  refreshHealth();
  setInterval(refresh, 5000);
  setInterval(refreshHealth, 5000);
</script>
</body>
</html>
